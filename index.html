<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>鋼鐵前線 Metal Front</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23111317'/%3E%3Cpath d='M14 40h36v8H14zM20 24h24v14H20zM24 16h16v8H24z' fill='%23e9b949'/%3E%3Cpath d='M42 29h14v5H42z' fill='%23f05d4f'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="hud" aria-label="遊戲狀態">
      <div>
        <span class="label">關卡</span>
        <strong id="levelText">1-1</strong>
      </div>
      <div>
        <span class="label">生命</span>
        <strong id="livesText">3</strong>
      </div>
      <div>
        <span class="label">武器</span>
        <strong id="weaponText">步槍</strong>
      </div>
      <div>
        <span class="label">分數</span>
        <strong id="scoreText">0</strong>
      </div>
    </section>

    <canvas id="game" width="1280" height="720" aria-label="鋼鐵前線遊戲畫面"></canvas>

    <section class="controls" aria-label="觸控操作">
      <div class="stick">
        <button data-hold="left" aria-label="向左">◀</button>
        <button data-hold="right" aria-label="向右">▶</button>
      </div>
      <div class="actions">
        <button data-hold="shoot" aria-label="射擊">射擊</button>
        <button data-press="jump" aria-label="跳躍">跳躍</button>
        <button data-press="grenade" aria-label="榴彈">榴彈</button>
      </div>
    </section>

    <div class="top-actions">
      <button id="pauseBtn" type="button">暫停</button>
      <button id="saveBtn" type="button">存檔</button>
      <button id="resetBtn" type="button">重開</button>
    </div>

    <section id="overlay" class="overlay" aria-live="polite">
      <div class="panel">
        <p class="kicker">Metal Front</p>
        <h1 id="overlayTitle">鋼鐵前線</h1>
        <p id="overlayText">
          原創橫向卷軸射擊。5 關闖關、復活點、存檔、武器升級、敵人刷新都已做好。
        </p>
        <div class="menu">
          <button id="startBtn" type="button">開始遊戲</button>
          <button id="loadBtn" type="button">讀取存檔</button>
        </div>
        <p class="help">鍵盤：A/D 移動、W/空白跳躍、J 射擊、K 榴彈、P 暫停。手機請橫拿操作。</p>
      </div>
    </section>

    <section class="rotate">請將手機橫向握持</section>
  </main>

  <script src="game.js"></script>
</body>
</html>
